<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - QR Attendance & HR Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load Bootstrap first -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom glassmorphic CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">QR Attendance System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="/scan">Scan Attendance</a></li>
          <li class="nav-item"><a class="nav-link active" href="/login">Admin Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 fade-in-up">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="glass-card text-center">
          <h2 class="page-title">Admin Login</h2>
          <p class="text-muted mb-4">Log in to manage records, reports, and settings</p>
          
          {% if error %}
            <div class="alert alert-danger border-0 bg-opacity-25 bg-danger text-danger mb-4" role="alert">
              {{ error }}
            </div>
          {% endif %}
          
          <form method="POST" class="text-start">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-premium w-100 mt-2">Log In</button>
          </form>
          
          <p class="mt-4 text-center">
            <a href="/reset_password" class="text-decoration-none text-info">Forgot Password?</a>
            <span class="mx-2 text-muted">|</span>
            <a href="/admin_register" class="text-decoration-none text-info">Register Admin</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
