<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - QR Attendance System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load Bootstrap first -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom glassmorphic CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">QR Attendance System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="/scan">Scan Attendance</a></li>
          <li class="nav-item"><a class="nav-link" href="/login">Admin Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5 fade-in-up">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="glass-card">
          <h2 class="page-title text-center">Reset Password</h2>
          <p class="text-muted text-center mb-4">Reset administrative credentials</p>
          
          {% if error %}
            <div class="alert alert-danger border-0 bg-opacity-25 bg-danger text-danger mt-3">{{ error }}</div>
          {% endif %}
          {% if success %}
            <div class="alert alert-success border-0 bg-opacity-25 bg-success text-success mt-3">{{ success }}</div>
          {% endif %}
          
          <form method="POST" class="mt-2">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-premium w-100">Reset Password</button>
          </form>
          
          <p class="mt-4 text-center">
            <a href="/login" class="text-decoration-none text-info">Back to Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
